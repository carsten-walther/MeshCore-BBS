services:
  meshcore-bbs:
    build: .
    image: ghcr.io/carsten-walther/meshcore-bbs:latest
    container_name: meshcore-bbs
    restart: unless-stopped

    environment:
      - BBS_CONFIG=/config/config.yaml

    # /config — config.yaml (editable on the host without rebuilding the image)
    # /data   — bbs.db and log files (set db_path: /data/bbs.db in config.yaml)
    volumes:
      - ./config:/config:ro
      - ./data:/data

    # --- SERIAL (companion radio attached via USB) — the default case ------
    # Pass the USB serial device through to the container. Check the real
    # path on the host first: `ls -l /dev/serial/by-id/` gives a stable path
    # that survives replug/reboot, unlike /dev/ttyUSB0 which can renumber.
    #devices:
    #  - "/dev/serial/by-id/usb-…:/dev/ttyUSB0"
    # The container user needs access to the serial device. Pass the numeric
    # GID of the "dialout" group from the host (`getent group dialout`).
    # The name won't resolve inside the slim image, so use the number (often 20).
    #group_add:
    #  - "20"   # dialout GID — adjust to your host

    # --- TCP (companion reachable over the network) -----------------------
    # If connection.type = "tcp" in config.yaml, no devices or group_add
    # needed — just normal network access.

    # --- BLE (companion over Bluetooth) — awkward in Docker ---------------
    # BLE needs the host Bluetooth stack and DBus. It generally requires:
    #   network_mode: host
    #   volumes: [..., /var/run/dbus:/var/run/dbus]
    #   cap_add: [NET_ADMIN]   (and sometimes privileged: true)
    # Prefer serial or TCP if possible.

networks:
  default:
    name: meshcore-bbs
